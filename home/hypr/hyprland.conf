# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hyprland.org/Configuring/Configuring-Hyprland/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf


################
### MONITORS ###
################

# See https://wiki.hyprland.org/Configuring/Monitors/
#monitor=,preferred,auto,auto
#monitor=,2880x1800@90,auto,2
monitor=,highres,auto,2


###################
### MY PROGRAMS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/

# Set programs that you use
$terminal = alacritty
$msg = notify-send -u normal
#$vol = pactl list sinks | grep '^[[:space:]]Volume:' | head -n $(( $SINK + 1 )) | tail -n 1 | sed -e 's,.* \([0-9][0-9]*\)%.*,\1,'
$vol = pamixer --get-volume
$bri = awk -v a=$(brightnessctl g) -v b=$(brightnessctl m) 'BEGIN {printf "%.0f%%\n", (a/b)*100}'
$screenfile = ${HOME}/med1a/pictures/screenshots/$(date +"%Y-%m-%d-%H%M%S")_grim.png
$lock = pgrep swaylock || swaylock --indicator --clock -S --ring-color="1a1a1a" --key-hl-color="d7005f" --text-color="d7005f" --inside-clear-color="1f75fe" --ring-clear-color="1f75fe" --inside-ver-color="87ff00" --ring-ver-color="87ff00" --effect-blur 7x5
$menu = wofi --show drun --gtk-dark --normal-window true
$fm = pcmanfm-qt
$notebook = leafpad
$touchpad = "device[syna2ba6:00-06cb:ce44-touchpad]:enabled" # m1uq0m5-armk

#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# exec-once = $terminal
# exec-once = nm-applet &
# exec-once = waybar & hyprpaper & firefox

# 告诉 wayland xwayland它自己会缩放两倍,让 wayland 不要管 xwayland 的缩放
#exec-once = xprop -root -f _XWAYLAND_GLOBAL_OUTPUT_SCALE 32c -set _XWAYLAND_GLOBAL_OUTPUT_SCALE 2
#exec-once = echo 'Xft.dpi:192' | xrdb -merge

exec-once = mako 
exec-once = waybar 
exec-once = alacritty
exec-once = fcitx5 -d
exec-once = swaybg -i ~/.dotfiles/pictures/wallpapers/red-highlands-brown-moutains.jpg
# exec-once = swayidle -w timeout 720 '$lock' timeout 900 'hyprctl dispatch dpms off' resume 'hyprctl dispatch dpms on' before-sleep '$lock'
exec-once = hypridle
exec-once = v2rayn
exec-once = ydotoold
exec-once = shimejictl mascot summon miku_pro
# exec-once = activate-linux -t "激活 M1uq0m5 OS" -m "转到“设置”以激活 M1uq0m5 OS。"
exec-once = activate-linux -t "enable m1kud.service" -m "redirect brkn_st4te to /dev/null"

exec-once = wl-paste --type text --watch cliphist store #Stores only text data
#exec-once = wl-paste --type image --watch cliphist store #Stores only image data

exec-once = xrdb -merge ~/.dotfiles/xorg/Xresources
exec-once = setxkbmap -option caps:escape
#exec-once = hyprctl setcursor rose-pine-hyprcursor 32

# gtk cursor-theme <folder-name>
#exec-once = gsettings set org.gnome.desktop.interface cursor-theme BreezeX-RosePine-Linux
#exec-once = gsettings set org.gnome.desktop.interface cursor-size 32

#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hyprland.org/Configuring/Environment-variables/

# XDG
env = XDG_CURRENT_DESKTOP, Hyprland
env = XDG_SESSION_TYPE, wayland
env = XDG_SESSION_DESKTOP, Hyprland

# Fcitx
env=XMODIFIERS, @im=fcitx
env=QT_IM_MODULE, fcitx
env=SDL_IM_MODULE, fcitx

# QT
env = QT_AUTO_SCREEN_SCALE_FACTOR, 1
env = QT_QPA_PLATFORM, wayland; xcb
env = QT_WAYLAND_DISABLE_WINDOWDECORATION, 1
env = QT_QPA_PLATFORMTHEME, qt6ct

# Misc
#env = GDK_BACKEND, x11
env = GDK_BACKEND, wayland, x11
env = CLUTTER_BACKEND, wayland
env = ADW_DISABLE_PORTAL, 1
exec-once = systemctl --user import-environment WAYLAND_DISPLAY

# Hyprcursor
env = HYPRCURSOR_SIZE, 32
env = HYPRCURSOR_THEME, rose-pine-hyprcursor

# Xwayland Hidpi
xwayland {
	force_zero_scaling = true
}

# toolkit-specific scale
env = GDK_SCALE, 2
# env = GDK_DPI_SCALE, 1
env = XCURSOR_SIZE, 32
env = XCURSOR_THEME, BreezeX-RosePine-Linux


#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hyprland.org/Configuring/Variables/

# https://wiki.hyprland.org/Configuring/Variables/#general
general { 
    gaps_in = 6
    gaps_out = 16

    border_size = 2

    # https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(d7005fee)
    col.inactive_border = rgba(1b1d1eee)
    # col.active_border = rgba(d7005fee) rgba(ff8700ee) 45deg
    # col.inactive_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    #col.inactive_border = rgba(00ddffee) rgba(87ff00ee) 45deg
    #col.inactive_border = rgba(595959aa)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false 

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    # no_cursor_warps = true
    layout = dwindle
    
    # no_focus_fallback = true
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 0

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    # special workspace
    dim_special = 0.0  # 范围是 0.0 到 1.0，0 表示完全不加深背景

    #drop_shadow = false
    #shadow_range = 4
    #shadow_render_power = 3
    #col.shadow = rgba(1a1a1aee)

    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        enabled = false
        size = 3
        passes = 1
        
        vibrancy = 0.1696
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = true

    # Default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    #animation = windows, 1, 3, myBezier
    animation = windows, 1, 4, myBezier, slide
    animation = windowsOut, 1, 5, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
    smart_split = false
    smart_resizing = false
    #no_gaps_when_only = 2
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    # new_is_master = true
    # new_status = master
    # new_on_top = 1
    # mfact = 0.5

    # new_status = inherit
    # inherit_fullscreen = true
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc { 
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
    key_press_enables_dpms = true
    allow_session_lock_restore = true
    mouse_move_enables_dpms = false
}

ecosystem {
        no_update_news = true
        no_donation_nag = true
        #enforce_permission = true
    }

#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant = dvorak
    kb_model =
    kb_options = caps:swapescape
    kb_rules =
    repeat_rate = 25
    repeat_delay = 450

    follow_mouse = 2
    float_switch_override_focus = 0
    mouse_refocus = false

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#gestures
gestures {
    # workspace_swipe = false
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


####################
### KEYBINDINGSS ###
####################

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod Alt, F5, exit
bind = $mainMod Shift, backspace, killactive

bind = $mainMod	Shift, F, togglefloating
bind = $mainMod	Shift, F, centerwindow , 1

bind = $mainMod, Return, exec, $terminal
bind = $mainMod Shift, Return, exec , [ float; center; size (monitor_w*0.6) (monitor_h*0.6) ] $terminal
bind = $mainMod Shift, SPACE, exec, $menu

bind = $mainMod, F, fullscreen, 0
bind = $mainMod, P, pseudo # dwindle
bind = $mainMod Shift, G, togglesplit # dwindle

# Move focus with mainMod + arrow keys
#bind = $mainMod, left, movefocus, l
bind = $mainMod, H, movefocus, l
bind = $mainMod, J, movefocus, d
bind = $mainMod, K, movefocus, u
bind = $mainMod, L, movefocus, r

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, C, togglespecialworkspace, m1ku
bind = $mainMod Shift, C, movetoworkspace, special:m1ku

#bind = $mainMod, S, togglespecialworkspace, magic
#bind = $mainMod, S, movetoworkspace, +0
#bind = $mainMod, S, togglespecialworkspace, magic
#bind = $mainMod, S, movetoworkspace, special:magic
#bind = $mainMod, S, togglespecialworkspace, magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, comma, workspace, e-1
bind = $mainMod, period, workspace, e+1
# All workspaces
bind = $mainMod Shift, comma, workspace, r-1
bind = $mainMod Shift, period, workspace, r+1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# alt->home
# bind = , Alt_R, exec, ydotool key 102:1 102:0
bind = $mainMod, w, exec, ydotool key 102:1 102:0
bind = $mainMod, v, exec, ydotool key 107:1 107:0

# Binds
binds{
	# Workspace previous
	allow_workspace_cycles = true

	#workspace_center_on = 1
}
bind = $mainMod, Tab, workspace, previous

# Volume
bind = $mainMod, A, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%; \
$msg "音量降低" `$vol`"%"
bind = $mainMod Shift, A, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%; \
$msg "音量提高" `$vol`"%"
bind = $mainMod Shift, M, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle; \
$msg "静音切换" "$(pactl get-sink-mute @DEFAULT_SINK@)"
bind = $mainMod Shift, E, exec, pactl set-sink-volume @DEFAULT_SINK@ 25%; \
$msg "音量重置" `$vol`"%"

# Backlight
# bind = $mainMod Alt, bracketleft, exec, light -U 5; $msg "current brightness：" `light -G`
# bind = $mainMod Alt, bracketright, exec, light -A 5; $msg "current brightness：" `light -G`
# bind = $mainMod, I, exec, brightnessctl s 5%-; $msg "current brightness：" `brightnessctl g`
# bind = $mainMod Shift, I, exec, brightnessctl s 5%+; $msg "current brightness：" `brightnessctl g`
bind = $mainMod, F12, exec, brightnessctl s 5%-; $msg "亮度降低" `$bri`
bind = $mainMod Shift, F12, exec, brightnessctl s 5%+; $msg "亮度提高" `$bri`

# Mpd music
bind = $mainMod, E, exec, mpc toggle; $msg "歌曲暂停/恢复" "`ncmpcpp -q --current-song=%f`"
bind = $mainMod Shift, O, exec, mpc prev;# $msg "<< 切歌" "`ncmpcpp -q --current-song=%f`"
bind = $mainMod, O, exec, mpc next; #$msg "切歌 >>" "`ncmpcpp -q --current-song=%f`"
bind = $mainMod Shift, D, exec, $msg "正在播放" "`ncmpcpp -q --current-song=%f`"

# Screenshot grim & slurp
# bind = $mainMod, T, exec, grim $screenfile && $msg "full screenshots success" "$screenfile"
# bind = $mainMod Shift, T, exec, grim -g "$(slurp)" $screenfile && $msg "area screenshots success" "$screenfile"
bind = $mainMod, apostrophe, exec, grim $screenfile && $msg "全屏截图" "$screenfile"
bind = $mainMod Shift, apostrophe, exec, grimblast save active $screenfile && $msg "窗口截图（active）" "$screenfile"
bind = $mainMod Shift, Q, exec, grim -g "$(slurp)" $screenfile && $msg "区域截图" "$screenfile"

# File Manager Pcmanfm
# bind = $mainMod, period, exec, $fm
# bind = $mainMod, F6, exec, $fm

# Notebook Leafpad
# bind = $mainMod Shift, F6, exec, $notebook

# Move cursor
bind = $mainMod, S, exec, ydotool mousemove --absolute 210 5
bind = $mainMod Shift, S, exec, ydotool mousemove --absolute 360 225

# hyprpicker
bind = $mainMod, F7, exec, color=$(hyprpicker -a) && $msg "Hyprpicker" "已获取颜色: $color" -i color-picker

# upl
bind = $mainMod, F6, exec, ~/.dotfiles/mpd-ncmpcpp/upl.sh > /dev/null 2>&1

# btr
bind = $mainMod Shift, F6, exec, ~/.dotfiles/mpd-ncmpcpp/btr.sh r > /dev/null 2>&1

# bind = $mainMod CTRL, semicolon,exec,hyprctl dispatch movecursor 720 450
# bind = $mainMod, S, exec, hyprctl dispatch movecursor 425 10
# sleep 1 && wlrctl pointer click
# warpd --click
# hyprctl input:mouse:click left
# bind = $mainMod Shift, S, exec, hyprctl dispatch movecursor 720 450
# sleep 1 && wlrctl pointer click
# warpd --click
# hyprctl input:mouse:click left

# SUPER+Shift+HJKL movewindow
bind = $mainMod Shift, H, movewindow, l
bind = $mainMod Shift, J, movewindow, d
bind = $mainMod Shift, K, movewindow, u
bind = $mainMod Shift, L, movewindow, r

# Submap example
#$mode-system = (l) lock | (e) exit | (s) suspend | (r) reboot | (Shift+s) poweroff
#bind = Control Shift, x, submap, $mode-system
#submap = $mode-system
#bind = , l, exec, $lock
#bind = , l, submap, reset
#bind = , e, exit
#bind = , s, exec, $lock & systemctl suspend
#bind = , s, submap, reset
#bind = , r, exec, systemctl reboot
#bind = Shift, s, exec, systemctl poweroff

# Super + R：切换到RESIZE模式
bind= $mainMod Shift, P, exec, $msg "边距调整" "resize mode"
bind= $mainMod Shift, P, submap, resize
submap = resize

    # 在RESIZE模式下使用hjkl调整窗口大小
    binde= , H, resizeactive, -10 0
    binde= , L, resizeactive, 10 0
    binde= , K, resizeactive, 0 -10
    binde= , J, resizeactive, 0 10

    # ESC退出RESIZE模式
    bind = , escape, submap, reset
submap = reset

# Lock & Suspend
bind=$mainMod Shift, F5, exec, $lock
bind=$mainMod, F5, exec, systemctl suspend

# Swap windows
bind = $mainMod, G, layoutmsg, swapsplit

# Reset the layouts on the current workspace to default (monocle-ish)
#bind = $mainMod, M, exec, hyprctl dispatch fullscreen 1
# bind = $mainMod, M, exec, $msg "布局变动" "monocle-ish toggle"
bind = $mainMod, M, fullscreen, 1

# bind = $mainMod, C, exec, togglegroup
bind = $mainMod, equal, exec, hyprctl dispatch togglegroup
bind = $mainMod Shift, equal, exec, hyprctl dispatch moveoutofgroup

bind = $mainMod Shift, slash, changegroupactive, b
bind = $mainMod, slash, changegroupactive, f

group {
    col.border_active = rgba(d7005fff) # 激活组的边框颜色（比如黄色）
    col.border_inactive = rgba(d7005fff)

    groupbar {
        enabled = true          # 开启顶部的标签条
        font_size = 12
        render_titles = false
        col.active = rgba(ff8700ee)
        col.inactive = rgba(d7005f00)
    }
}

# bind = $mainMod, Q, cyclenext
bind = $mainMod, Q, exec, ~/.dotfiles/hypr/cycle_monocle.sh
# bind = $mainMod Shift, Q, layoutmsg, cycleprev

# Lid; trigger when the switch is toggled
# bindl=,switch:[switch name],exec,swaylock

# Touchpad
# bind = $mainMod, X, exec, hyprctl keyword $touchpad 0 && $msg "hyprctl msg" "disable touchpad"
# bind = $mainMod Shift, X, exec, hyprctl keyword $touchpad 1 && $msg "hyprctl msg" "enable touchpad"
bind = $mainMod, F11, exec, hyprctl keyword $touchpad 0 && \
$msg "hyprctl msg" "触控板已禁用"
bind = $mainMod Shift, F11, exec, hyprctl keyword $touchpad 1 && \
$msg "hyprctlmsg" "触控板已启用"

# Clipboard
bind = $mainMod, D, exec, \
cliphist list | wofi --dmenu --gtk-dark --normal-window true | cliphist decode | wl-copy

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

# 0.53+
windowrule {
    name = mpv
    match:class = mpv
    float = on
    center = on
    size = (monitor_w*0.6) (monitor_h*0.7)
}

windowrule {
    name = imv
    match:class = imv
    float = on
    center = on
    # dim_around = on
}

windowrule {
    name = ueberzugpp
    match:class = ^ueberzugpp_.*$
    float = on
    center = off
    no_anim = on
    no_focus = on
    no_blur = on
    border_size = 0
}

windowrule {
    name = pavucontrol
    match:class = org.pulseaudio.pavucontrol
    float = on
    center = on
    size = (monitor_w*0.6) (monitor_h*0.7)
}

windowrule {
    name = Leafpad
    match:class = Leafpad
    float = on
    center = on
    size = (monitor_w*0.6) (monitor_h*0.7)
}

windowrule {
    name = pcmanfm
    match:class = pcmanfm-qt
    float = on
    center = on
    size = (monitor_w*0.6) (monitor_h*0.7)
}

windowrule {
    name = VirtualBox
    match:class = ^VirtualBox Manager$
    float = on
    center = on
}

windowrule {
    name = portal
    match:class = .*portal.*
    float = on
    center = on
    size = (monitor_w*0.6) (monitor_h*0.7)
}

windowrule {
    name = ardour-add-Media
    match:class = ^Ardour$
    match:title = ^Add Existing Media$
    float = on
    center = on
    size = (monitor_w*0.6) (monitor_h*0.7)
}

windowrule {
    name = vocaloid6
    match:class = ^vocaloid6\.exe$
    # center = on
    # float = on
    no_blur = true
    no_shadow = true
    no_anim = true
}

windowrule {
	name = wine desktop
	match:class = explorer.exe
	center = on
	# float = off
}

